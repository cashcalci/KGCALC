<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KG Price Calculator</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      padding:20px;
    }

    .container{
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding-top:60px;
    }

    .card{
      width:100%;
      max-width:420px;
      background:#ffffff;
      border-radius:24px;
      padding:30px 25px;
      box-shadow:0 15px 40px rgba(0,0,0,0.25);
    }

    .title{
      text-align:center;
      font-size:30px;
      font-weight:700;
      color:#111827;
      margin-bottom:30px;
    }

    .input-group{
      margin-bottom:22px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-size:15px;
      font-weight:600;
      color:#374151;
    }

    input{
      width:100%;
      padding:16px;
      border:none;
      outline:none;
      border-radius:14px;
      background:#f3f4f6;
      font-size:17px;
      transition:0.3s;
    }

    input:focus{
      background:#ffffff;
      border:2px solid #2563eb;
      box-shadow:0 0 12px rgba(37,99,235,0.2);
    }

    .result-box{
      margin-top:25px;
      background:#2563eb;
      border-radius:20px;
      padding:22px;
      text-align:center;
      color:#ffffff;
    }

    .result-label{
      font-size:15px;
      opacity:0.9;
    }

    .result{
      margin-top:8px;
      font-size:38px;
      font-weight:700;
    }

    @media(max-width:480px){

      .container{
        padding-top:40px;
      }

      .card{
        padding:25px 20px;
      }

      .title{
        font-size:26px;
      }

      .result{
        font-size:32px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="card">

      <div class="title">KG Price Calculator</div>

      <div class="input-group">
        <label>Enter KG</label>
        <input type="number" id="kg" placeholder="Enter weight in KG">
      </div>

      <div class="input-group">
        <label>Price Per KG (₹)</label>
        <input type="number" id="priceKg" placeholder="Enter price per KG">
      </div>

      <div class="result-box">
        <div class="result-label">Total Amount</div>
        <div class="result" id="total">₹0.00</div>
      </div>

    </div>

  </div>

  <script>

    const kgInput = document.getElementById("kg");
    const priceKgInput = document.getElementById("priceKg");
    const total = document.getElementById("total");

    function calculatePrice(){

      const kg = parseFloat(kgInput.value) || 0;
      const priceKg = parseFloat(priceKgInput.value) || 0;

      const finalPrice = kg * priceKg;

      total.innerText = "₹" + finalPrice.toFixed(2);
    }

    kgInput.addEventListener("input", calculatePrice);
    priceKgInput.addEventListener("input", calculatePrice);

  </script>

</body>
</html>
